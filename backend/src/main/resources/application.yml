server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: thesis-display-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:thesis_mail}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:zyf.1023}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:haojy5108@163.com}
    password: ${MAIL_SMTP_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:10000}
          timeout: ${MAIL_TIMEOUT_MS:15000}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:15000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  mail:
    sender-email: ${MAIL_SENDER_EMAIL:haojy5108@163.com}
    target-email: ${MAIL_TARGET_EMAIL:2401284861@qq.com}
    default-locale: ${MAIL_DEFAULT_LOCALE:en}
    zone-id: ${MAIL_QUOTA_ZONE:UTC}
    daily-limit: ${MAIL_DAILY_LIMIT:5}
    monthly-limit: ${MAIL_MONTHLY_LIMIT:10}
    allowed-origins: ${APP_ALLOWED_ORIGINS:https://zyf1516516515.github.io,http://localhost:5173}
    retry-delays-seconds: ${MAIL_RETRY_DELAYS_SECONDS:60,300,900,3600,21600}
    retry-batch-size: ${MAIL_RETRY_BATCH_SIZE:20}
    retry-poll-interval-ms: ${MAIL_RETRY_POLL_INTERVAL_MS:30000}

logging:
  level:
    root: INFO
    com.thesisdisplay.backend: INFO
