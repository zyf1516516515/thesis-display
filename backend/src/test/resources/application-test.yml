spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  mail:
    sender-email: test@example.com
    target-email: admin@example.com
    default-locale: en
    zone-id: UTC
    daily-limit: 5
    monthly-limit: 10
    allowed-origins: http://localhost:5173
