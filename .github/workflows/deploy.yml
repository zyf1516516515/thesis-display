name: Deploy Vue3 to GitHub Pages

on:
  # 监听 main 分支的 push 事件
  push:
    branches: [ master ]
    # 如果你的主分支叫 master，请把上面的 main 改成 master

permissions:
  contents: write # 允许 Action 修改仓库内容（推送 dist）

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 推荐使用较新版本

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
          # 如果你在用 pnpm 或 yarn，请自行替换命令，例如：
          # yarn install && yarn build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vue 打包生成的目录
          branch: gh-pages # 部署到这个分支